<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCKED IN - No Way Out</title>
    <style>
        body {
            background-color: #F6DF03;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-placeholder {
            width: 300px;
            height: 300px;
            background-color: #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .locked {
            font-size: 50px;
        }

        .random-text {
            max-width: 400px;
            margin: 10px auto;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="image-placeholder">
            <img src="./lockedin.jpeg" alt="Locked In Image" />
        </div>
        <h1>LOCKED IN 🔒</h1>
        <div class="locked">💸🚀</div>
        <p class="random-text">No second thoughts. No exit strategy. Just locked in for the win.</p>
        <p class="random-text">FOMO is for the weak. Discipline is for the rich. Stay locked in.</p>
        <p class="random-text">The only way out is up. Bags secured. No looking back.</p>
    </div>
</body>

</html>
